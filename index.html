<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Price Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 15px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input, select, button {
            font-size: 16px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1f4037;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #14532d;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #1f4037;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-left: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bike Price Predictor 🚀</h2>

    <form id="form">

        <label for="year">Year of Purchase</label>
        <select id="year" required>
            <!-- JavaScript will populate years here -->
        </select>

        <input type="number" id="km" placeholder="KM Driven" required>

        <input type="number" id="price" placeholder="On road price" required>

        <input type="text" id="brand" placeholder="Brand (e.g. Yamaha, Honda)" required>

        <input type="text" id="model" placeholder="Model (e.g. Xpulse 200)" required>

        <select id="seller">
            <option value="Individual">Individual</option>
            <option value="Dealer">Dealer</option>
        </select>

        <select id="owner">
            <option value="First Owner">First Owner</option>
            <option value="Second Owner">Second Owner</option>
            <option value="Third Owner">Third Owner</option>
        </select>

        <button type="submit">Predict Price</button>

    </form>

    <div class="result" id="result"></div>
    <div class="error" id="error"></div>

</div>

<script>
// Populate Year Dropdown dynamically
const yearSelect = document.getElementById("year");
const currentYear = new Date().getFullYear();
for (let i = currentYear; i >= 1990; i--) {
    let option = document.createElement("option");
    option.value = i;
    option.text = i;
    yearSelect.appendChild(option);
}

document.getElementById("form").onsubmit = async function(e) {
    e.preventDefault();

    document.getElementById("result").innerText = "";
    document.getElementById("error").innerText = "";

    const selectedYear = Number(document.getElementById("year").value);
    const calculatedAge = currentYear - selectedYear;

    const data = {
        Age: calculatedAge,
        km_driven: Number(document.getElementById("km").value),
        ex_showroom_price: Number(document.getElementById("price").value),
        brand: document.getElementById("brand").value,
        model: document.getElementById("model").value,
        seller_type: document.getElementById("seller").value,
        owner: document.getElementById("owner").value
    };

    try {
        const response = await fetch("https://web-production-52a08.up.railway.app/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.error || result.status === "error") {
            document.getElementById("error").innerText =
                result.error || result.message;
        } else {
            document.getElementById("result").innerText =
                "Estimated Price: ₹" + Math.round(result.predicted_price);
        }

    } catch (err) {
        document.getElementById("error").innerText =
            "Server not reachable!";
    }
};
</script>

</body>
</html>
